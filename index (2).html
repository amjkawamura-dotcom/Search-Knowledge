<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<title>商品情報・FAQ 検索 | カスタマーサポート</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠️</text></svg>">
<style>
  :root {
    --bg: #eef1f6;
    --card: #ffffff;
    --ink: #1f2937;
    --ink-soft: #5b6678;
    --ink-faint: #aab3c0;
    --navy: #1e3a5f;
    --navy-deep: #14263f;
    --accent: #2f6fb0;
    --accent-soft: #9fc1e0;
    --faq: #3f7a64;
    --faq-soft: #d9ebe2;
    --change: #3a5b94;
    --change-soft: #e3e9f4;
    --cs: #6b5b95;
    --cs-soft: #eae9f4;
    --line: #dde3ec;
    --shadow: 0 4px 18px rgba(30, 58, 95, 0.10);
    --shadow-lift: 0 8px 28px rgba(30, 58, 95, 0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    background: var(--bg);
    background-image: radial-gradient(circle at 15% 0%, #f3f6fb 0%, transparent 55%),
                      radial-gradient(circle at 95% 100%, #e4eaf3 0%, transparent 50%);
    color: var(--ink);
    line-height: 1.7;
    min-height: 100vh;
    -webkit-text-size-adjust: 100%;
  }

  /* ===== ログイン ===== */
  #login {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(160deg, #1e3a5f, #14263f);
    z-index: 100; padding: 24px;
  }
  .login-card {
    background: var(--card); border-radius: 24px; box-shadow: var(--shadow-lift);
    padding: 44px 34px 38px; width: 100%; max-width: 380px; text-align: center;
    border: 1px solid var(--line);
  }
  .login-card .mark { font-size: 40px; margin-bottom: 6px; }
  .login-card h1 { font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 4px; letter-spacing: 0.04em; }
  .login-card p.sub { font-size: 13px; color: var(--ink-soft); margin-bottom: 26px; }
  .login-card input {
    width: 100%; padding: 14px 16px; font-size: 20px; text-align: center;
    letter-spacing: 0.5em; border: 2px solid var(--line); border-radius: 14px;
    background: #fff; color: var(--ink); outline: none; transition: border-color .2s; font-family: inherit;
  }
  .login-card input:focus { border-color: var(--accent-soft); }
  .login-card button {
    width: 100%; margin-top: 16px; padding: 14px; font-size: 16px; font-weight: 700;
    background: var(--accent); color: #fff; border: none; border-radius: 14px;
    cursor: pointer; transition: background .2s, transform .1s; font-family: inherit;
  }
  .login-card button:hover { background: var(--navy); }
  .login-card button:active { transform: scale(0.98); }
  .login-err { color: #c0392b; font-size: 13px; margin-top: 14px; min-height: 18px; }

  /* ===== メイン ===== */
  #app { display: none; max-width: 1480px; margin: 0 auto; padding: 22px 20px 80px; }
  header.site { text-align: center; padding: 6px 0 4px; }
  header.site .mark { font-size: 26px; }
  header.site h1 { font-size: 17px; color: var(--navy); font-weight: 700; letter-spacing: 0.03em; }
  header.site p { font-size: 11.5px; color: var(--ink-soft); margin-top: 2px; }

  /* ===== 2カラムレイアウト（左：検索 1/4、右：結果 3/4） ===== */
  .layout { display: grid; grid-template-columns: minmax(280px, 1fr) 3fr; gap: 20px; align-items: start; }
  .side { position: sticky; top: 14px; max-height: calc(100vh - 28px); overflow-y: auto; padding-right: 2px; }
  .side::-webkit-scrollbar { width: 6px; }
  .side::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
  .main { min-width: 0; }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .side { position: static; max-height: none; overflow: visible; }
  }

  .search-wrap { padding: 0; margin-top: 0; }
  .search-box { background: var(--card); border: 1.5px solid var(--line); border-radius: 18px; box-shadow: var(--shadow); padding: 14px 16px; }
  .search-box label { font-size: 12px; color: var(--ink-soft); display:block; margin-bottom: 6px; }
  .search-input-row { display: flex; gap: 8px; }
  .search-box input[type=text] {
    flex: 1; padding: 12px 14px; font-size: 16px; border: 1.5px solid var(--line);
    border-radius: 12px; outline: none; background: #fff; color: var(--ink); font-family: inherit; transition: border-color .2s;
  }
  .search-box input[type=text]:focus { border-color: var(--accent-soft); }
  .search-box .clear-btn {
    padding: 0 16px; border: 1.5px solid var(--line); background: #fff; border-radius: 12px;
    cursor: pointer; color: var(--ink-soft); font-size: 14px; font-family: inherit; white-space: nowrap; transition: background .2s;
  }
  .search-box .clear-btn:hover { background: #eef2f8; }
  .hint { font-size: 11.5px; color: var(--ink-soft); margin-top: 8px; line-height: 1.5; }

  /* おすすめ回答パネル（AI回答風） */
  .ai-answer {
    background: #fff; border: 2px solid var(--accent-soft); border-radius: 16px;
    padding: 16px 18px 14px; margin-bottom: 14px; box-shadow: var(--shadow);
    position: relative;
  }
  .ai-answer::before {
    content: ''; position: absolute; inset: -2px; border-radius: 16px; padding: 2px;
    background: linear-gradient(120deg, #2f6fb0, #6b5b95, #3f7a64);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
  }
  .ai-answer .ai-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .ai-answer .ai-head .badge {
    background: linear-gradient(120deg, #2f6fb0, #6b5b95); color: #fff;
    font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px;
  }
  .ai-answer .ai-head .src { font-size: 11px; color: var(--ink-faint); }
  .ai-answer .ai-title { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .ai-answer .ai-oneline {
    background: #eaf3fc; border-left: 4px solid var(--accent); border-radius: 8px;
    padding: 10px 12px; margin-bottom: 12px; font-size: 14px; font-weight: 600; color: var(--navy);
    line-height: 1.7;
  }
  .ai-answer .ai-oneline .ol-label { font-size: 11px; color: var(--accent); display: block; font-weight: 700; letter-spacing: .05em; margin-bottom: 2px; }
  .ai-answer .ai-oneline .flag {
    display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 999px;
    margin-left: 6px; vertical-align: middle;
  }
  .ai-answer .ai-oneline .flag.paid { background: #fdeaea; color: #b03a3a; border: 1px solid #f0c5c5; }
  .ai-answer .ai-oneline .flag.free { background: #e5f4ec; color: #2e7d54; border: 1px solid #bfe0cf; }
  .ai-answer .ai-body { font-size: 13.5px; color: var(--ink); line-height: 1.8; }
  .ai-answer .ai-body .sec { margin-bottom: 8px; white-space: pre-wrap; word-break: break-word; }
  .ai-answer .ai-body .sec-label { font-weight: 700; color: var(--accent); font-size: 12.5px; }
  .ai-answer .ai-body .sec.warn .sec-label { color: #b3701f; }
  .ai-answer .ai-more {
    margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line);
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .ai-answer .ai-more .lbl { font-size: 11.5px; color: var(--ink-soft); }
  .ai-answer .rel-btn {
    border: 1.5px solid var(--line); background: #f7f9fc; color: var(--navy);
    border-radius: 999px; padding: 4px 12px; font-size: 12px; cursor: pointer; font-family: inherit;
    transition: background .15s;
  }
  .ai-answer .rel-btn:hover { background: #eaf1f9; }
  .ai-answer .ai-note { font-size: 10.5px; color: var(--ink-faint); margin-top: 8px; }

  /* 絞り込みアシスタント */
  .assist {
    background: linear-gradient(135deg, #f6faff, #eef4fb);
    border: 1.5px solid var(--accent-soft); border-radius: 16px;
    padding: 14px 16px 12px; margin-bottom: 14px; box-shadow: var(--shadow);
  }
  .assist .aq { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 9px; }
  .assist .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .assist .chip {
    border: 1.5px solid var(--accent-soft); background: #fff; color: var(--navy);
    border-radius: 999px; padding: 6px 14px; font-size: 13px; cursor: pointer;
    transition: background .15s, color .15s; font-family: inherit;
  }
  .assist .chip:hover { background: var(--accent); color: #fff; }
  .assist .chip .n { font-size: 11px; opacity: .65; margin-left: 4px; }
  .assist .anote { font-size: 11px; color: var(--ink-soft); margin-top: 8px; }

  /* 関連度表示の案内バー */
  .relevance-note {
    background: #fbf7ee; border: 1.5px solid #ecdfc3; border-radius: 12px;
    padding: 10px 14px; margin-bottom: 14px; font-size: 12.5px; color: #8a6d3b;
  }

  /* タブ */
  .tabs { display: flex; flex-direction: column; gap: 7px; margin-top: 12px; }
  .tab {
    text-align: left; padding: 9px 14px; font-size: 13px; font-weight: 700;
    border: 1.5px solid var(--line); background: #fff; color: var(--ink-soft);
    border-radius: 12px; cursor: pointer; transition: all .15s; font-family: inherit;
    display: flex; justify-content: space-between; align-items: center; gap: 6px;
  }
  @media (max-width: 900px) {
    .tabs { flex-direction: row; flex-wrap: wrap; }
    .tab { flex: 1 1 30%; justify-content: center; text-align: center; padding: 9px 6px; }
  }
  .tab .tcount { font-size: 11px; font-weight: 400; opacity: .8; }
  .tab.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  .tab.active.faq { background: var(--faq); border-color: var(--faq); }
  .tab.active.change { background: var(--change); border-color: var(--change); }
  .tab.active.csmanual { background: var(--cs); border-color: var(--cs); }

  .toolbar { display:flex; align-items:center; justify-content:space-between; gap:8px; margin: 14px 4px; flex-wrap: wrap; }
  .count { font-size: 13px; color: var(--ink-soft); }
  .count b { color: var(--navy); }
  .reload-btn {
    font-size: 12px; color: var(--accent); background: #fff; border: 1.5px solid var(--line);
    border-radius: 10px; padding: 6px 12px; cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; gap: 5px; transition: background .2s;
  }
  .reload-btn:hover { background: #eef2f8; }

  /* ===== カード ===== */
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow); margin-bottom: 16px; overflow: hidden; transition: box-shadow .2s; }
  .card:hover { box-shadow: var(--shadow-lift); }
  .card.faq-card { border-left: 4px solid var(--faq); }
  .card.prod-card { border-left: 4px solid var(--navy); }
  .card.change-card { border-left: 4px solid var(--change); }
  .card.csmanual-card { border-left: 4px solid var(--cs); }
  .card-head { padding: 16px 18px; cursor: pointer; display: flex; align-items: flex-start; gap: 12px; user-select: none; }
  .card-head .id {
    flex: none; min-width: 34px; height: 34px; padding: 0 7px; border-radius: 10px;
    background: var(--navy); color: #fff; font-weight: 700; font-size: 13px;
    display: flex; align-items: center; justify-content: center; white-space: nowrap;
  }
  .faq-card .card-head .id { background: var(--faq); }
  .change-card .card-head .id { background: var(--change); }
  .csmanual-card .card-head .id { background: var(--cs); }
  .card-head .head-body { flex: 1; min-width: 0; }
  .card-head .pname { font-size: 16px; font-weight: 700; color: var(--ink); }
  .typetag { display:inline-block; font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:999px; margin-bottom:4px; }
  .typetag.prod { background: var(--navy); color:#fff; }
  .typetag.faq { background: var(--faq); color:#fff; }
  .typetag.change { background: var(--change); color:#fff; }
  .typetag.csmanual { background: var(--cs); color:#fff; }
  .badge { display: inline-block; background: #e7eef7; color: var(--accent); font-size: 11px; padding: 2px 9px; border-radius: 999px; margin-right: 6px; margin-top: 6px; }
  .badge.model { background: #e5efe9; color: var(--faq); }
  .badge.faqcat { background: var(--faq-soft); color: var(--faq); }
  .badge.changecat { background: var(--change-soft); color: var(--change); }
  .badge.cscat { background: var(--cs-soft); color: var(--cs); }
  .card-head .chev { flex: none; color: var(--accent); font-size: 18px; transition: transform .25s; align-self: center; }
  .faq-card .card-head .chev { color: var(--faq); }
  .change-card .card-head .chev { color: var(--change); }
  .csmanual-card .card-head .chev { color: var(--cs); }
  .card.open .chev { transform: rotate(180deg); }

  .symptom-line { font-size: 13.5px; color: var(--ink-soft); margin-top: 6px; white-space: pre-wrap; }
  .symptom-line .sym-label { color: var(--navy); font-weight: 700; }
  .faq-card .symptom-line .sym-label { color: var(--faq); }
  .change-card .symptom-line .sym-label { color: var(--change); }
  .csmanual-card .symptom-line .sym-label { color: var(--cs); }

  .card-body { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
  .card.open .card-body { max-height: 3200px; border-top: 1px solid var(--line); }
  .card-body-inner { padding: 16px 18px 18px; }

  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field .ftitle { font-size: 11.5px; font-weight: 700; color: var(--navy); letter-spacing: 0.05em; margin-bottom: 4px; }
  .faq-card .field .ftitle { color: var(--faq); }
  .change-card .field .ftitle { color: var(--change); }
  .csmanual-card .field .ftitle { color: var(--cs); }
  .field .fbody {
    font-size: 14px; color: var(--ink); white-space: pre-wrap; word-break: break-word;
    background: #f4f7fb; border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px;
  }
  .field.parts .fbody { background: #eef2f8; font-size: 13px; }
  .field.notice .fbody { color: #b06a1a; background: #fdf4e7; border-color: #f0ddc0; }
  .field.answer .fbody { background: var(--faq-soft); border-color: #c5ddd2; }
  .field.csbody .fbody { background: var(--cs-soft); border-color: #d6cfe8; }
  .field.tpl .fbody { background: #fbf7ee; border-color: #ecdfc3; font-size: 13px; }

  /* 検索ワード（薄めのグレー表示） */
  .keywords-line {
    margin-top: 14px; padding-top: 10px; border-top: 1px dashed var(--line);
    font-size: 12px; color: var(--ink-faint); white-space: pre-wrap; word-break: break-word;
  }
  .keywords-line .kw-label { font-size: 10.5px; letter-spacing: 0.05em; margin-right: 6px; }
  .keywords-line mark { background: #fff3c2; color: #8a8f99; }

  .link-btn {
    display: inline-flex; align-items: center; gap: 7px; margin-top: 4px;
    background: var(--accent); color: #fff; text-decoration: none; padding: 9px 15px;
    border-radius: 11px; font-size: 13.5px; font-weight: 700; transition: background .2s, transform .1s; line-height: 1.4; word-break: break-all;
  }
  .link-btn:hover { background: var(--navy); }
  .link-btn:active { transform: scale(0.98); }
  .link-row { display: flex; flex-wrap: wrap; gap: 8px; }

  mark { background: #ffe9a8; color: inherit; padding: 0 2px; border-radius: 3px; }

  .empty, .loading, .errorbox { text-align: center; padding: 50px 20px; color: var(--ink-soft); }
  .empty .em, .loading .em, .errorbox .em { font-size: 42px; }
  .empty p, .loading p, .errorbox p { font-size: 15px; margin-top: 8px; }
  .spinner { width: 34px; height: 34px; border: 3px solid var(--line); border-top-color: var(--accent); border-radius: 50%; margin: 0 auto; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .errorbox p.detail { font-size: 12px; color: #c0392b; margin-top: 10px; word-break: break-all; }

  .section-label { font-size: 12px; font-weight: 700; color: var(--ink-soft); margin: 18px 4px 10px; letter-spacing: .05em; display:flex; align-items:center; gap:6px; }
  .section-label::after { content:''; flex:1; height:1px; background: var(--line); }

  footer { text-align: center; font-size: 11.5px; color: var(--ink-soft); padding: 24px 0 0; }

  @media (max-width: 480px) {
    header.site h1 { font-size: 18px; }
    .card-head .pname { font-size: 15px; }
  }
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login">
  <div class="login-card">
    <div class="mark">🛠️</div>
    <h1>商品情報・FAQ 検索</h1>
    <p class="sub">カスタマーサポート 社内検索ツール</p>
    <input id="pw" type="password" inputmode="numeric" placeholder="パスワード" maxlength="8" autocomplete="off">
    <button id="loginBtn">ログイン</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- メイン -->
<div id="app">
  <div class="layout">
    <aside class="side">
      <header class="site">
        <div class="mark">🛠️</div>
        <h1>商品情報・FAQ 検索</h1>
        <p>商品の症状・エラーコードや、よくあるご質問をまとめて検索できます</p>
      </header>

      <div class="search-wrap">
        <div class="search-box">
          <label for="q">🔍 検索・質問（スペース区切りで複数ワードもOK）</label>
          <div class="search-input-row">
            <input id="q" type="text" placeholder="例： BW-SRM16 E05 ／ 左ペダルが取り付けできない" autocomplete="off">
            <button class="clear-btn" id="clearBtn">クリア</button>
          </div>
          <div class="hint">キーワードでも「〜はどうすればいい？」のような質問文でも検索できます。複数ワードはスペース区切りですべて含む結果に絞り込み。ぴったり一致する情報がない場合は、近い情報を関連度順に表示します。</div>
        </div>
        <div class="tabs">
          <div class="tab active" data-filter="all" id="tabAll">すべて <span class="tcount" id="cAll"></span></div>
          <div class="tab" data-filter="product" id="tabProd">📦 商品情報 <span class="tcount" id="cProd"></span></div>
          <div class="tab faq" data-filter="faq" id="tabFaq">❓ FAQ・対応方針 <span class="tcount" id="cFaq"></span></div>
          <div class="tab change" data-filter="change" id="tabChange">⛏️ 交換手順 <span class="tcount" id="cChange"></span></div>
          <div class="tab csmanual" data-filter="csmanual" id="tabCs">🧏 CSマニュアル <span class="tcount" id="cCs"></span></div>
        </div>
      </div>

      <div class="toolbar">
        <div class="count" id="count"></div>
        <button class="reload-btn" id="reloadBtn">🔄 最新データに更新</button>
      </div>
    </aside>

    <main class="main">
      <div id="results"></div>
    </main>
  </div>

  <footer>カスタマーサポート 検索ツール｜データはスプレッドシートと自動連携しています</footer>
</div>

<script>
/* ===================================================================
   ★★★ 設定：ここにGASのウェブアプリURLを貼り付けてください ★★★
   （列構成変更に対応した新しいGASをデプロイした場合は、そのURLに差し替え）
=================================================================== */
const API_URL = "https://script.google.com/macros/s/AKfycbxrbAcIlm2uRiiuG0eK7-v41pfowECde2NBeHjrXASQ2jTpdnA9HODv-1aDAzW9LhEOCw/exec";

const PASSWORD = "0588";

let PRODUCTS = [];
let FAQS = [];
let CHANGES = [];
let CSMANUALS = [];
let activeFilter = 'all';

const loginEl = document.getElementById('login');
const appEl = document.getElementById('app');
const pwEl = document.getElementById('pw');
const errEl = document.getElementById('loginErr');
const qEl = document.getElementById('q');
const resultsEl = document.getElementById('results');
const countEl = document.getElementById('count');

/* ===== ログイン ===== */
function tryLogin() {
  if (pwEl.value === PASSWORD) {
    loginEl.style.display = 'none';
    appEl.style.display = 'block';
    loadData();
  } else {
    errEl.textContent = 'パスワードが正しくありません。';
    pwEl.value = '';
    pwEl.focus();
  }
}
document.getElementById('loginBtn').addEventListener('click', tryLogin);
pwEl.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

/* ===== データ取得 ===== */
function loadData() {
  resultsEl.innerHTML = '<div class="loading"><div class="spinner"></div><p>最新データを読み込んでいます…</p></div>';
  countEl.textContent = '';

  if (!API_URL || API_URL.indexOf('script.google.com') === -1) {

/* ===== ユーティリティ ===== */
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function highlight(text, terms){
  let html = escapeHtml(text);
  terms.forEach(t=>{
    if(!t) return;
    const re = new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    html = html.replace(re,'<mark>$1</mark>');
  });
  return html;
}
function matchTerms(text, terms){
  const t = text.toLowerCase();
  return terms.every(term => t.includes(term));
}
/* タイトル組み立て（空欄はスキップして全角スペースで連結） */
function joinTitle(){
  return Array.prototype.slice.call(arguments).map(s=>String(s||'').trim()).filter(Boolean).join('　');
}
function extractLinks(){
  let urls = [];
  const re = /(https?:\/\/[^\s　）)】」]+)/g;
  for(let i=0;i<arguments.length;i++){
    const f = arguments[i];
    if(!f) continue;
    let m;
    while((m = re.exec(f)) !== null){ urls.push(m[1]); }
  }
  return [...new Set(urls)];
}
function linkLabel(url){
  if(url.indexOf('youtu')!==-1) return '▶ 参考動画を開く';
  if(url.indexOf('.pdf')!==-1) return '📄 PDFを開く';
  if(url.indexOf('docs.google')!==-1 || url.indexOf('spreadsheets')!==-1 || url.indexOf('drive.google')!==-1) return '📊 参考シート・資料を開く';
  return '🔗 リンクを開く';
}
function linkButtons(urls){
  if(!urls.length) return '';
  const btns = urls.map(u=>'<a class="link-btn" href="'+escapeHtml(u)+'" target="_blank" rel="noopener">'+linkLabel(u)+'</a>').join('');
  return '<div class="field"><div class="ftitle">🔗 リンク</div><div class="link-row">'+btns+'</div></div>';
}
/* 検索ワード（薄めのグレーで最後に表示） */
function keywordsLine(kw, terms){
  if(!kw || !String(kw).trim()) return '';
  return '<div class="keywords-line"><span class="kw-label">🔖 検索ワード</span>'+highlight(kw, terms)+'</div>';
}

/* ===== おすすめ回答（シート内情報から自動生成） =====
   質問文と各データを文字単位（2文字ペア）で照合し、
   最も近い情報の解決方法・回答をまとめて表示する */

/* 質問文からノイズ（質問の言い回し）を除去 */
function cleanQuestion(q){
  return String(q||'')
    .replace(/について教えて.*|を教えて.*|教えてください|教えて|ください|ですか？?|でしょうか？?|ますか？?/g, '')
    .replace(/どうすれば(いい|よい)?|どうしたら(いい|よい)?|どう対応|とは何|とは|の場合|したい(です)?|するには/g, '')
    .replace(/[？?！!。、．，]/g, ' ')
    .trim();
}
function normalizeText(s){
  return String(s||'').toLowerCase().replace(/[\s　、。・！？!?（）()「」『』【】\[\]:：;；]/g, '');
}
function bigramsOf(s){
  const set = {};
  for(let i = 0; i < s.length - 1; i++){ set[s.substr(i, 2)] = true; }
  return Object.keys(set);
}
/* 一致度スコア：質問の2文字ペアが本文にどれだけ含まれるか（0〜1） */
function similarity(qBigrams, text){
  if(!qBigrams.length) return 0;
  let hit = 0;
  for(let i = 0; i < qBigrams.length; i++){
    if(text.indexOf(qBigrams[i]) !== -1) hit++;
  }
  return hit / qBigrams.length;
}

function recTitle(r){
  if(r._type === 'product') return joinTitle(r.name, r.model) + (r.symptom ? '：' + r.symptom.slice(0, 40) : '');
  if(r._type === 'faq') return joinTitle(r.category, (r.question||'').slice(0, 50));
  if(r._type === 'change') return joinTitle(r.name, r.model) + '（交換手順）';
  return joinTitle(r.category, (r.content||'').slice(0, 50));
}
function trimText(s, n){
  s = String(s||'').trim();
  return s.length > n ? s.slice(0, n) + '…' : s;
}

/* ひとことまとめ：対応の要点を1行に要約＋有償/無償の目印 */
function oneLineSummary(r){
  let src = '';
  if(r._type === 'product') src = r.solution || r.symptom;
  else if(r._type === 'faq') src = r.answer;
  else if(r._type === 'change') src = (r.parts ? '交換パーツ：' + r.parts : r.note);
  else src = r.detail || r.reply;
  src = String(src||'').replace(/[\r\n\t]+/g, ' ').replace(/[ 　]+/g, ' ').trim();
  if(!src) return null;
  /* 最初の文（句点まで）を抜き出し、長すぎれば切り詰め */
  let first = src.split(/。/)[0].trim();
  first = trimText(first, 75);

  /* 有償・無償の判定フラグ */
  const allText = [r.solution, r.notice, r.answer, r.note, r.note2, r.detail, r.reply].join(' ');
  const flags = [];
  if(/有償|有料/.test(allText)) flags.push('<span class="flag paid">💰 有償対応の可能性</span>');
  if(/無償|無料/.test(allText)) flags.push('<span class="flag free">🆓 無償対応の記載あり</span>');

  return '<div class="ai-oneline"><span class="ol-label">🗣️ ひとことまとめ</span>'
    + escapeHtml(first) + (first.slice(-1) === '…' ? '' : '。')
    + flags.join('')
    + '</div>';
}

/* 回答本文を組み立て */
function buildAnswerBody(r){
  const sec = (label, txt, warn, n)=> txt ? '<div class="sec'+(warn?' warn':'')+'"><span class="sec-label">'+label+'</span>\n'+escapeHtml(trimText(txt, n||320))+'</div>' : '';
  let html = '';
  if(r._type === 'product'){
    html += sec('🔧 推奨される対応', r.solution);
    html += sec('⚠️ 注意事項', r.notice, true);
    if(!html) html += sec('📌 症状・内容', r.symptom);
    html += sec('📦 パーツコード', r.parts, false, 240);
  } else if(r._type === 'faq'){
    html += sec('💬 回答・対応方針', r.answer);
    html += sec('🗣️ 案内文例', r.example);
  } else if(r._type === 'change'){
    html += sec('🔩 交換パーツ', r.parts);
    html += sec('📦 パーツコード', r.partsCode, false, 240);
    html += sec('🛠️ 使用工具', r.tools);
    html += sec('📝 備考', r.note);
  } else {
    html += sec('💬 補足・対応内容', r.detail);
    html += sec('✉️ 返信例', r.reply);
  }
  return html;
}

function recSearchText(r){
  if(r._type === 'product') return normalizeText([r.name,r.model,r.category,r.symptom,r.solution,r.keywords,r.phrase].join(' '));
  if(r._type === 'faq') return normalizeText([r.category,r.question,r.answer,r.phrase].join(' '));
  if(r._type === 'change') return normalizeText([r.name,r.model,r.category,r.parts,r.keywords,r.phrase].join(' '));
  return normalizeText([r.category,r.content,r.detail,r.keywords,r.phrase].join(' '));
}

function buildAiAnswer(rawQuery){
  const candidates = []
    .concat(PRODUCTS.map(o=>Object.assign({_type:'product'}, o)))
    .concat(FAQS.map(o=>Object.assign({_type:'faq'}, o)))
    .concat(CHANGES.map(o=>Object.assign({_type:'change'}, o)))
    .concat(CSMANUALS.map(o=>Object.assign({_type:'csmanual'}, o)));

  /* 検索欄がIDと完全一致 → その情報に固定（関連ボタン経由の表示ズレ防止） */
  const idq = String(rawQuery||'').trim().toLowerCase();
  const pinned = candidates.find(r=>String(r.id||'').trim().toLowerCase() === idq);

  let top = null;
  let scored = [];
  if(pinned){
    top = pinned;
  } else {
    const cleaned = cleanQuestion(rawQuery);
    const qn = normalizeText(cleaned);
    if(qn.length < 2) return '';
    const qBigrams = bigramsOf(qn);
    if(qBigrams.length < 2) return '';
    scored = candidates
      .map(r=>({r: r, s: similarity(qBigrams, recSearchText(r))}))
      .filter(x=>x.s >= 0.35)
      .sort((a,b)=>b.s - a.s)
      .slice(0, 3);
    if(!scored.length) return '';
    top = scored[0].r;
  }

  const body = buildAnswerBody(top);
  if(!body) return '';
  const oneline = oneLineSummary(top) || '';

  let rel = '';
  if(pinned){
    /* 固定表示中は「戻る」だけを表示 */
    if(prevQuery !== null){
      rel = '<button class="rel-btn back-btn">← 元の検索に戻る</button>';
    }
  } else {
    rel = scored.slice(1)
      .map(x=>'<button class="rel-btn" data-recid="'+escapeHtml(x.r.id)+'">'+escapeHtml(trimText(recTitle(x.r), 30))+'</button>')
      .join('');
  }

  return '<div class="ai-answer">'
    + '<div class="ai-head"><span class="badge">💡 おすすめの回答</span><span class="src">シート内の登録情報から自動でまとめています</span></div>'
    + '<div class="ai-title">'+escapeHtml(trimText(recTitle(top), 70))+'</div>'
    + oneline
    + '<div class="ai-body">'+body+'</div>'
    + (rel ? '<div class="ai-more"><span class="lbl">'+(pinned ? '' : '関連する情報：')+'</span>'+rel+'</div>' : '')
    + '<div class="ai-note">※ 内容はスプレッドシートの登録情報の抜粋です。最終判断は必ず元のカードをご確認ください（ID: '+escapeHtml(top.id)+'）</div>'
    + '</div>';
}

/* ===== 絞り込みアシスタント =====
   結果が多いとき、質問＋選択ボタンを表示して対話的に絞り込む */
const ASSIST_THRESHOLD = 8; /* この件数を超えたらアシスタントを表示 */

function topValues(list, key, limit){
  const cnt = {};
  list.forEach(o=>{
    const v = String(o[key]||'').trim();
    if(!v) return;
    cnt[v] = (cnt[v]||0) + 1;
  });
  return Object.keys(cnt)
    .sort((a,b)=>cnt[b]-cnt[a])
    .slice(0, limit)
    .map(v=>({v: v, n: cnt[v]}));
}

function topKeywords(list, usedTerms, limit){
  const cnt = {};
  list.forEach(o=>{
    String(o.keywords||'').split(/[,、，\s　\/／|｜]+/).forEach(k=>{
      k = k.trim();
      if(!k || k.length < 2) return;
      if(usedTerms.indexOf(k.toLowerCase()) !== -1) return;
      cnt[k] = (cnt[k]||0) + 1;
    });
  });
  return Object.keys(cnt)
    .sort((a,b)=>cnt[b]-cnt[a])
    .slice(0, limit)
    .map(v=>({v: v, n: cnt[v]}));
}

    + '<div class="anote">'+note+'</div></div>';
}

function buildAssist(prodList, faqList, changeList, csList, total, terms){
  if(total <= ASSIST_THRESHOLD) return '';
  const all = [].concat(prodList, faqList, changeList, csList);

  /* ① カテゴリーが複数混在 → カテゴリーを質問 */
  const cats = topValues(all, 'category', 8);
  if(cats.length >= 2){
    return assistPanel('💬 結果が '+total+' 件あります。どのカテゴリーに関する内容ですか？', cats, 'cat',
      'タップすると検索ワードに追加して絞り込みます');
  }
  /* ② 商品が複数混在 → 商品を質問 */
  const names = topValues([].concat(prodList, changeList), 'name', 8);
  if(names.length >= 2){
    return assistPanel('💬 どの商品についてお調べですか？', names, 'name',
      'タップすると検索ワードに追加して絞り込みます');
  }
  /* ③ 検索ワードのヒントを質問 */
  const kws = topKeywords(all, terms, 8);
  if(kws.length >= 2){
    return assistPanel('💬 近いキーワードはありますか？', kws, 'free',
      'タップすると検索ワードに追加されます');
  }
  return '';
}

/* ===== 描画 ===== */
function toTerms(v){ return (v||'').trim().toLowerCase().split(/[\s　]+/).filter(Boolean); }

function render(){
  const terms = toTerms(qEl.value); /* AND検索用 */

  let prodList = [];
  let faqList = [];
  let changeList = [];
  let csList = [];

  if(activeFilter === 'all' || activeFilter === 'product'){
    prodList = PRODUCTS.filter(p=>{
      if(!terms.length) return true;
      return matchTerms([p.id,p.name,p.model,p.category,p.symptom,p.solution,p.notice,p.image,p.parts,p.phrase,p.tplInitial,p.tplWarranty,p.tplOutside,p.note,p.keywords].join(' '), terms);
    });
  }
  if(activeFilter === 'all' || activeFilter === 'faq'){
    faqList = FAQS.filter(f=>{
      if(!terms.length) return true;
      return matchTerms([f.id,f.category,f.question,f.answer,f.relatedProduct,f.phrase,f.example,f.note].join(' '), terms);
    });
  }
  if(activeFilter === 'all' || activeFilter === 'change'){
    changeList = CHANGES.filter(c=>{
      if(!terms.length) return true;
      return matchTerms([c.id,c.name,c.model,c.category,c.parts,c.partsCode,c.tools,c.phrase,c.note,c.note2,c.keywords].join(' '), terms);
    });
  }
  if(activeFilter === 'all' || activeFilter === 'csmanual'){
    csList = CSMANUALS.filter(m=>{
      if(!terms.length) return true;
      return matchTerms([m.id,m.category,m.content,m.detail,m.phrase,m.reply,m.note,m.keywords].join(' '), terms);
    });
  }

  let total = prodList.length + faqList.length + changeList.length + csList.length;

  /* 完全一致が0件のとき：質問文とみなして関連度順に近い情報を表示 */
  let relevanceMode = false;
  let hlTerms = terms;
  if(total === 0 && terms.length){
    const qn = normalizeText(cleanQuestion(qEl.value));
    const qb = bigramsOf(qn);
    if(qb.length >= 2){
      const scoreArr = (arr, type)=>arr
        .map(o=>{ const r = Object.assign({_type: type}, o); return {r: r, s: similarity(qb, recSearchText(r))}; })
        .filter(x=>x.s >= 0.3);
      let scored = [];
      if(activeFilter === 'all' || activeFilter === 'product') scored = scored.concat(scoreArr(PRODUCTS, 'product'));
      if(activeFilter === 'all' || activeFilter === 'faq') scored = scored.concat(scoreArr(FAQS, 'faq'));
      if(activeFilter === 'all' || activeFilter === 'change') scored = scored.concat(scoreArr(CHANGES, 'change'));
      if(activeFilter === 'all' || activeFilter === 'csmanual') scored = scored.concat(scoreArr(CSMANUALS, 'csmanual'));
      scored.sort((a,b)=>b.s - a.s);
      scored = scored.slice(0, 10);
      if(scored.length){
        relevanceMode = true;
        prodList = scored.filter(x=>x.r._type==='product').map(x=>x.r);
        faqList = scored.filter(x=>x.r._type==='faq').map(x=>x.r);
        changeList = scored.filter(x=>x.r._type==='change').map(x=>x.r);
        csList = scored.filter(x=>x.r._type==='csmanual').map(x=>x.r);
        total = scored.length;
        hlTerms = toTerms(cleanQuestion(qEl.value)); /* ハイライトは質問の要点語で */
      }
    }
  }

  if(terms.length){
    countEl.innerHTML = relevanceMode
      ? '関連度順に <b>'+total+'</b> 件を表示中'
      : '<b>'+total+'</b> 件が見つかりました';
  } else {
    countEl.innerHTML = '全 <b>'+total+'</b> 件を表示中';
  }

  /* 質問・検索ワードがあればおすすめ回答を生成 */
  const aiHtml = terms.length ? buildAiAnswer(qEl.value) : '';

  if(total===0){
    resultsEl.innerHTML = aiHtml + '<div class="empty"><div class="em">🔎</div><p>'
      + (aiHtml
        ? '一覧にぴったり一致するものはありませんでしたが、<br>近い情報を上にまとめて表示しています。'
        : '該当する情報が見つかりませんでした。<br>キーワードを変えてお試しください。')
      + '</p></div>';
    return;
  }

  let html = aiHtml;
  if(relevanceMode){
    html += '<div class="relevance-note">💡 ぴったり一致する情報はありませんでしたが、ご質問に近い情報を関連度の高い順に表示しています。</div>';
  } else {
    html += buildAssist(prodList, faqList, changeList, csList, total, terms);
  }
  if(prodList.length){
    if(activeFilter==='all') html += '<div class="section-label">📦 商品情報（'+prodList.length+'件）</div>';
    html += prodList.map(p=>productCard(p, hlTerms)).join('');
  }
  if(faqList.length){
    if(activeFilter==='all') html += '<div class="section-label">❓ FAQ・カスタマー対応方針（'+faqList.length+'件）</div>';
    html += faqList.map(f=>faqCard(f, hlTerms)).join('');
  }
  if(changeList.length){
    if(activeFilter==='all') html += '<div class="section-label">⛏️ 交換手順（'+changeList.length+'件）</div>';
    html += changeList.map(c=>changeCard(c, hlTerms)).join('');
  }
  if(csList.length){
    if(activeFilter==='all') html += '<div class="section-label">🧏 CSマニュアル情報（'+csList.length+'件）</div>';
    html += csList.map(m=>csmanualCard(m, hlTerms)).join('');
  }
  resultsEl.innerHTML = html;

  /* 結果が少なく絞れたときだけカードを自動で開く（多いときは一覧性を優先） */
  if(terms.length && total <= 5){
    document.querySelectorAll('.card').forEach(c=>c.classList.add('open'));
  }
}

/* アシスタントの選択ボタン（クリックで検索枠に反映） */
let prevQuery = null; /* 関連情報ボタンを押す前の検索ワード（戻る用） */
resultsEl.addEventListener('click', (e)=>{
  const back = e.target.closest('.back-btn');
  if(back){
    qEl.value = prevQuery || '';
    prevQuery = null;
    render();
    window.scrollTo({top: 0, behavior: 'smooth'});
    return;
  }
  const rel = e.target.closest('.rel-btn');
  if(rel){
    if(prevQuery === null) prevQuery = qEl.value; /* 最初の検索ワードを保持 */
    qEl.value = rel.dataset.recid || '';
    render();
    window.scrollTo({top: 0, behavior: 'smooth'});
    return;
  }
  const chip = e.target.closest('.chip');
  if(!chip) return;
  const val = chip.dataset.val || '';
  const cur = qEl.value.trim();
  qEl.value = cur ? cur + ' ' + val : val;
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
});

let timer;
qEl.addEventListener('input', ()=>{
  prevQuery = null; /* 手入力が始まったら戻る先はリセット */
  clearTimeout(timer);
  timer = setTimeout(()=>render(), 120);
});
document.getElementById('clearBtn').addEventListener('click', ()=>{
  qEl.value='';
  prevQuery = null;
  render(); qEl.focus();
});
</script>
